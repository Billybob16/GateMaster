{% extends "layout.html" %}
{% block content %}

<div class="hud-panel">

    <h1 class="hud-title">RTU Relay Control</h1>
Manage relay behavior including authorization level, ON timer, notification triggers, and SMS message content.

    <form method="POST" action="/rtu/relay-control/save" class="hud-form">

        <div class="hud-form-group">
            <label>Relay Control Authorization</label>
            <input type="number" name="relay_auth" value="{{ s.relay_auth }}" class="hud-input">
        </div>

        <div class="hud-form-group">
            <label>Relay ON Timer (sec)</label>
            <input type="number" name="relay_on_timer" value="{{ s.relay_on_timer }}" class="hud-input">
        </div>

        <div class="hud-form-group">
            <label>Notify on Relay ON</label>
            <input type="number" name="notify_on_on" value="{{ s.notify_on_on }}" class="hud-input">
        </div>

        <div class="hud-form-group">
            <label>Notify on Relay OFF</label>
            <input type="number" name="notify_on_off" value="{{ s.notify_on_off }}" class="hud-input">
        </div>

        <div class="hud-form-group">
            <label>SMS Content when Relay ON</label>
            <input type="text" name="sms_on" value="{{ s.sms_on }}" class="hud-input">
        </div>

        <div class="hud-form-group">
            <label>SMS Content when Relay OFF</label>
            <input type="text" name="sms_off" value="{{ s.sms_off }}" class="hud-input">
        </div>

        <div class="hud-actions">
            <button class="hud-btn" type="submit">Save</button>
            <button class="hud-btn hud-btn-secondary" type="button" onclick="pushToDevice()">Push to Device</button>

            <form method="POST" action="/rtu/reset-defaults" style="display:inline;">
                <button class="hud-btn hud-btn-secondary" type="submit">Reset Defaults</button>
            </form>
        </div>

    </form>

    <h2 class="hud-subtitle">Current JSON Config</h2>
    <pre id="rtu-json-preview" class="hud-json"></pre>

</div>

<script>
function pushToDevice() {
    fetch("/api/push", { method: "POST" })
        .then(r => r.json())
        .then(() => alert("Configuration pushed to device."));
}

// Load JSON preview
fetch("/api/config")
    .then(r => r.json())
    .then(data => {
        document.getElementById("rtu-json-preview").textContent =
            JSON.stringify(data, null, 2);
    });
</script>

{% endblock %}
