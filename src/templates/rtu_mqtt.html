{% extends "layout.html" %}
{% block content %}

<div class="hud-panel">

    <h1 class="hud-title">RTU MQTT Settings</h1>

    <form method="POST" action="/rtu/mqtt/save" class="hud-form">

        <div class="hud-form-group">
            <label>MQTT User</label>
            <input type="text" name="mqtt_user" value="{{ s.mqtt_user }}" class="hud-input">
        </div>

        <div class="hud-form-group">
            <label>MQTT Password</label>
            <input type="text" name="mqtt_password" value="{{ s.mqtt_password }}" class="hud-input">
        </div>

        <div class="hud-form-group">
            <label>MQTT Publish Topic</label>
            <input type="text" name="mqtt_publish" value="{{ s.mqtt_publish }}" class="hud-input">
        </div>

        <div class="hud-form-group">
            <label>MQTT Subscribe Topic</label>
            <input type="text" name="mqtt_subscribe" value="{{ s.mqtt_subscribe }}" class="hud-input">
        </div>

        <div class="hud-form-group">
            <label>MQTT Upload Interval (sec)</label>
            <input type="number" name="mqtt_upload_interval" value="{{ s.mqtt_upload_interval }}" class="hud-input">
        </div>

        <div class="hud-actions">
            <button class="hud-btn" type="submit">Save</button>
            <button class="hud-btn hud-btn-secondary" type="button" onclick="pushToDevice()">Push to Device</button>

            <form method="POST" action="/rtu/reset-defaults" style="display:inline;">
                <button class="hud-btn hud-btn-secondary" type="submit">Reset Defaults</button>
            </form>
        </div>

    </form>

    <h2 class="hud-subtitle">Current JSON Config</h2>
    <pre id="rtu-json-preview" class="hud-json"></pre>

</div>

<script>
function pushToDevice() {
    fetch("/api/push", { method: "POST" })
        .then(r => r.json())
        .then(() => alert("Configuration pushed to device."));
}

// Load JSON preview
fetch("/api/config")
    .then(r => r.json())
    .then(data => {
        document.getElementById("rtu-json-preview").textContent =
            JSON.stringify(data, null, 2);
    });
</script>

{% endblock %}
