{% extends "layout.html" %}
{% block content %}

<div class="hud-panel">

    <h1 class="hud-title">RTU GPRS / Server Settings</h1>

    <form method="POST" action="/rtu/gprs/save" class="hud-form">

        <div class="hud-form-group">
            <label>Server IP Address</label>
            <input type="text" name="server_ip" value="{{ s.server_ip }}" class="hud-input">
        </div>

        <div class="hud-form-group">
            <label>Server Port</label>
            <input type="number" name="server_port" value="{{ s.server_port }}" class="hud-input">
        </div>

        <div class="hud-form-group">
            <label>GPRS APN</label>
            <input type="text" name="gprs_apn" value="{{ s.gprs_apn }}" class="hud-input">
        </div>

        <div class="hud-form-group">
            <label>GPRS User</label>
            <input type="text" name="gprs_user" value="{{ s.gprs_user }}" class="hud-input">
        </div>

        <div class="hud-form-group">
            <label>GPRS Password</label>
            <input type="text" name="gprs_password" value="{{ s.gprs_password }}" class="hud-input">
        </div>

        <div class="hud-actions">
            <button class="hud-btn" type="submit">Save</button>
            <button class="hud-btn hud-btn-secondary" type="button" onclick="pushToDevice()">Push to Device</button>

            <form method="POST" action="/rtu/reset-defaults" style="display:inline;">
                <button class="hud-btn hud-btn-secondary" type="submit">Reset Defaults</button>
            </form>
        </div>

    </form>

    <h2 class="hud-subtitle">Current JSON Config</h2>
    <pre id="rtu-json-preview" class="hud-json"></pre>

</div>

<script>
function pushToDevice() {
    fetch("/api/push", { method: "POST" })
        .then(r => r.json())
        .then(() => alert("Configuration pushed to device."));
}

// Load JSON preview
fetch("/api/config")
    .then(r => r.json())
    .then(data => {
        document.getElementById("rtu-json-preview").textContent =
            JSON.stringify(data, null, 2);
    });
</script>

{% endblock %}
