<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ title if title else "GateMaster HUD" }}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/static/js/dashboard.js" defer></script>
</head>
<div id="push-modal">
  <div class="push-modal-inner">
    <div class="push-stage" id="stage1">Establishing secure link to RTU5025…</div>
    <div class="push-stage" id="stage2">Authenticating device password…</div>
    <div class="push-stage" id="stage3">Uploading configuration package…</div>
    <div class="push-progress">
      <div class="push-progress-bar" id="push-progress-bar"></div>
    </div>
  </div>
</div>
<script src="/static/js/hud.js"></script>

<body>

<div class="scanlines"></div>

<div class="sidebar">
    <div class="brand">
        <div class="brand-icon"></div>
        <div class="brand-text">GateMaster</div>
    </div>

    <a class="nav-item {% if active=='dashboard' %}active{% endif %}" href="/dashboard">
        <span class="icon">🟩</span> Dashboard
    </a>

    <a class="nav-item {% if active=='devices' %}active{% endif %}" href="/devices">
        <span class="icon">📡</span> Devices
    </a>

    <a class="nav-item {% if active=='history' %}active{% endif %}" href="/history">
        <span class="icon">📜</span> History
    </a>

    <a class="nav-item {% if active=='signal' %}active{% endif %}" href="/signal">
        <span class="icon">📈</span> Signal Graph
    </a>

    <a class="nav-item {% if active=='settings' %}active{% endif %}" href="/settings">
        <span class="icon">⚙️</span> Settings
    </a>

    <a class="nav-item {% if active=='system' %}active{% endif %}" href="/system">
        <span class="icon">💻</span> System Info
    </a>

    <a class="nav-item {% if active=='debug' %}active{% endif %}" href="/debug">
        <span class="icon">🧪</span> Debug Console
    </a>

    <a class="nav-item logout" href="/logout">
        <span class="icon">🚪</span> Logout
    </a>
</div>

<div class="content">
    <div class="glass-panel">
        {% block content %}{% endblock %}
    </div>
</div>

</body>
</html>
