<!DOCTYPE html>
<html>
<head>
    <title>RJL Commercial • Smart RTU5025</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .header-bg { background: linear-gradient(90deg, #0a2540, #1e3a5f); }
        .card { background: linear-gradient(180deg, #1e3a5f, #0f2a4a); }
    </style>
</head>
<body class="bg-[#0a2540] text-white">

<div class="header-bg text-white py-3 px-6 flex items-center justify-between">
    <div class="flex items-center gap-3">
        <span class="text-2xl">📡</span>
        <div>
            <span class="text-xl font-bold">RJL Commercial</span>
            <span class="text-cyan-400"> • Smart RTU5025</span>
        </div>
    </div>
    <div class="flex items-center gap-4">
        <div class="bg-green-500 text-black text-xs px-3 py-1 rounded-full font-bold">● Connected</div>
        <div class="flex items-center gap-2 bg-white/10 px-4 py-1 rounded-lg">
            <span class="text-cyan-400 font-mono">+6149465297</span>
        </div>
        <button class="bg-white text-black px-4 py-1 rounded-lg text-sm font-medium">RJL Admin</button>
    </div>
</div>

<div class="bg-[#112b4a] border-b border-cyan-400/30 px-6 py-2 flex gap-2 overflow-x-auto">
    <a href="/dashboard" class="px-5 py-2 bg-cyan-400 text-black rounded-xl font-medium flex items-center gap-1">📊 Dashboard</a>
    <a href="/relay" class="px-5 py-2 hover:bg-white/10 rounded-xl flex items-center gap-1">⚙️ Relay Settings</a>
    <a href="/users" class="px-5 py-2 hover:bg-white/10 rounded-xl flex items-center gap-1">👥 User Management</a>
    <a href="/advanced" class="px-5 py-2 hover:bg-white/10 rounded-xl flex items-center gap-1">🔧 Advanced Commands</a>
    <a href="/logs" class="px-5 py-2 hover:bg-white/10 rounded-xl flex items-center gap-1">📜 History & Logs</a>
</div>

<div class="p-6">
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 max-w-7xl mx-auto">
        <div class="card rounded-3xl p-6 shadow-2xl">
            <div class="flex items-center gap-2 mb-4">
                <span class="text-cyan-400 text-xl">📶</span>
                <h2 class="text-xl font-semibold">Signal & Network</h2>
            </div>
            <div class="bg-black/30 rounded-2xl p-4 mb-6">
                <div class="h-3 bg-gray-700 rounded-full overflow-hidden">
                    <div class="h-full w-[38%] bg-gradient-to-r from-cyan-400 to-emerald-400"></div>
                </div>
                <div class="text-center text-sm mt-1 text-cyan-400">38%</div>
            </div>
            <div class="space-y-4 text-sm">
                <div class="flex justify-between"><span class="text-gray-400">RSSI (CSQ):</span><span class="font-mono">12</span></div>
                <div class="flex justify-between"><span class="text-gray-400">Signal (dBm):</span><span class="font-mono">-89 dBm</span></div>
                <div class="flex justify-between"><span class="text-gray-400">Network Status:</span><span class="text-emerald-400">Registered</span></div>
            </div>
            <div class="flex gap-3 mt-8">
                <button onclick="alert('Signal checked!')" class="flex-1 bg-cyan-400 text-black font-medium py-3 rounded-2xl">🔄 Check Signal</button>
                <button onclick="alert('Full status requested!')" class="flex-1 bg-white/10 py-3 rounded-2xl">ℹ️ Full Status</button>
            </div>
        </div>

        <div class="card rounded-3xl p-6 shadow-2xl">
            <div class="flex items-center gap-2 mb-4">
                <span class="text-cyan-400 text-xl">📟</span>
                <h2 class="text-xl font-semibold">Device Info</h2>
            </div>
            <div class="space-y-4 text-sm">
                <div class="flex justify-between"><span class="text-gray-400">Model:</span><span class="font-bold">RTU5025</span></div>
                <div class="flex justify-between"><span class="text-gray-400">SIM Number:</span><span class="font-mono">+6149465297</span></div>
                <div class="flex justify-between"><span class="text-gray-400">Password:</span><span class="font-mono">6666</span></div>
            </div>
            <div class="flex gap-3 mt-8">
                <button onclick="alert('Relay triggered!')" class="flex-1 bg-cyan-400 text-black font-medium py-3 rounded-2xl">⚡ Trigger Relay Now</button>
                <button onclick="alert('Reboot requested!')" class="flex-1 bg-amber-400 text-black font-medium py-3 rounded-2xl">🔄 Reboot Device</button>
            </div>
        </div>
    </div>
</div>

</body>
</html>
